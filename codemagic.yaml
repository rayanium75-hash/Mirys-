# Codemagic Continuous Integration configuration for Mirys
# Optimized for Android 10 (API 29) and above

workflows:
  mirys-android-production:
    name: MIRYS Android Production
    max_build_duration: 30

    environment:
      groups:
        - mirys_secrets
      vars:
        SUPABASE_URL: "https://ozhgvfpaxpfuxotznzoj.supabase.co"
      java: 17
      android_gradle: 8.0

    scripts:
      - name: Create .env file
        script: |
          echo "SUPABASE_URL=https://ozhgvfpaxpfuxotznzoj.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "AI_API_KEY=$AI_API_KEY" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" >> .env

      - name: Install dependencies
        script: |
          chmod +x gradlew
          # Gradle handles dependencies automatically during build

      - name: Build
        script: |
          # Build Release APK and App Bundle
          ./gradlew assembleRelease bundleRelease \
            -PSUPABASE_URL="https://ozhgvfpaxpfuxotznzoj.supabase.co" \
            -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            -PAI_API_KEY="$AI_API_KEY"

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - alanementii73@gmail.com
        notify:
          success: true
          failure: true
