# Codemagic Continuous Integration configuration for Mirys
# Optimized for Android 10 and based on the provided template structure

workflows:
  mirys-android-production:
    name: MIRYS Android Production
    max_build_duration: 30

    environment:
      groups:
        - mirys_secrets
      vars:
        VITE_SUPABASE_URL: "https://ozhgvfpaxpfuxotznzoj.supabase.co"
      java: 17
      android_gradle: 8.0

    scripts:
      - name: Create .env file
        script: |
          echo "VITE_SUPABASE_URL=https://ozhgvfpaxpfuxotznzoj.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "AI_API_KEY=$AI_API_KEY" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" >> .env

      - name: Install dependencies
        script: |
          chmod +x gradlew
          # Gradle manages Android dependencies automatically

      - name: Build
        script: |
          # Building Mirys Android Production (APK & Bundle)
          ./gradlew assembleRelease bundleRelease \
            -PVITE_SUPABASE_URL="https://ozhgvfpaxpfuxotznzoj.supabase.co" \
            -PVITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
            -PAI_API_KEY="$AI_API_KEY"

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - alanementii73@gmail.com
        notify:
          success: true
          failure: true
